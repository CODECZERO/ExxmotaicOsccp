# ═══════════════════════════════════════════════════════════════════════
#  HAProxy — Exxomatic IoT Reverse Proxy
#  Routes traffic by hostname + path to backend services
# ═══════════════════════════════════════════════════════════════════════

global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    timeout connect  5s
    timeout client   60s
    timeout server  120s
    timeout tunnel  3600s

# ─── Frontend ────────────────────────────────────────────────────────
frontend http_in
    bind *:80

    # ── WebSocket: OCPP charger connections ──────────────────────────
    acl is_websocket   hdr(Upgrade) -i websocket
    acl is_ocpp_path   path_beg /ocpp/

    # Route WebSocket by port prefix in path:
    #   /ocpp-echo/...    → Echo server :8000
    #   /ocpp-echo-n/...  → Echo-N server :5001
    #   /ocpp/...         → Core production server :5000
    acl is_echo_path   path_beg /ocpp-echo/
    acl is_echo_n_path path_beg /ocpp-echo-n/

    use_backend ocpp_echo   if is_websocket is_echo_path
    use_backend ocpp_echo_n if is_websocket is_echo_n_path
    use_backend ocpp_core   if is_websocket is_ocpp_path

    # ── API: hostname-based routing ──────────────────────────────────
    acl is_api_host    hdr(host) -i charger-api.exxomatic.in
    use_backend api_server if is_api_host

    # ── SSE: live stream needs long timeout ──────────────────────────
    acl is_live_stream path_beg /api/live/stream
    use_backend api_server_sse if is_live_stream

    # ── API: path-based routing (fallback for local dev) ─────────────
    acl is_api_path    path_beg /api/
    use_backend api_server if is_api_path

    # ── Default: everything else → frontend ──────────────────────────
    default_backend frontend_app

# ─── Backends ────────────────────────────────────────────────────────

backend api_server
    option httpchk GET /api/health
    http-check expect status 200
    server api1 server:5050 check inter 10s

backend api_server_sse
    # SSE streams need very long timeouts
    timeout server 3600s
    timeout tunnel 3600s
    option httpchk GET /api/health
    http-check expect status 200
    server api_sse1 server:5050 check inter 10s

backend frontend_app
    server web1 frontend:3000 check inter 10s

backend ocpp_core
    # WebSocket connections stay open for hours
    timeout server 86400s
    timeout tunnel 86400s
    server ws1 ocpp-core:5000 check inter 10s

backend ocpp_echo
    # Echo debug server — long-lived WebSocket
    timeout server 86400s
    timeout tunnel 86400s
    # Rewrite /ocpp-echo/ → /ocpp/ so the echo server sees standard paths
    http-request set-path %[path,regsub(^/ocpp-echo/,/ocpp/)]
    server echo1 ocpp-echo:8000 check inter 10s

backend ocpp_echo_n
    # Echo-N debug server — long-lived WebSocket
    timeout server 86400s
    timeout tunnel 86400s
    # Rewrite /ocpp-echo-n/ → /ocpp/ so the echo-n server sees standard paths
    http-request set-path %[path,regsub(^/ocpp-echo-n/,/ocpp/)]
    server echo_n1 ocpp-echo-n:5001 check inter 10s
