# ═══════════════════════════════════════════════════════════════════════
#  Exxomatic IoT — Docker Compose
#  Full-stack: HAProxy + Flask API + Next.js + OCPP WebSocket
# ═══════════════════════════════════════════════════════════════════════

services:

  # ─── HAProxy Reverse Proxy ─────────────────────────────────────────
  haproxy:
    image: haproxy:2.9-alpine
    container_name: exxomatic-haproxy
    ports:
      - "80:80"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      server:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - exxomatic-net
    restart: unless-stopped

  # ─── Flask REST API (Gunicorn) ─────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: exxomatic-server
    env_file: .env
    environment:
      - BIND_HOST=0.0.0.0
      - API_PORT=5050
    expose:
      - "5050"
    networks:
      - exxomatic-net
    restart: unless-stopped

  # ─── Next.js Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: web-client/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: exxomatic-frontend
    expose:
      - "3000"
    networks:
      - exxomatic-net
    restart: unless-stopped

  # ─── OCPP WebSocket Server ────────────────────────────────────────
  ocpp-core:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: exxomatic-ocpp-core
    env_file: .env
    environment:
      - BIND_HOST=0.0.0.0
      - CORE_PORT=5000
    entrypoint: ["python", "-m", "core.main"]
    expose:
      - "5000"
    networks:
      - exxomatic-net
    restart: unless-stopped

  # ─── OCPP Echo Debug Server ──────────────────────────────────────
  ocpp-echo:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: exxomatic-ocpp-echo
    env_file: .env
    environment:
      - BIND_HOST=0.0.0.0
      - ECHO_PORT=8000
    entrypoint: ["python", "-m", "echo.main"]
    expose:
      - "8000"
    networks:
      - exxomatic-net
    restart: unless-stopped

  # ─── OCPP Echo-N Debug Server ────────────────────────────────────
  ocpp-echo-n:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: exxomatic-ocpp-echo-n
    env_file: .env
    environment:
      - BIND_HOST=0.0.0.0
      - ECHO_N_PORT=5001
    entrypoint: ["python", "echo-n/main.py"]
    expose:
      - "5001"
    networks:
      - exxomatic-net
    restart: unless-stopped

networks:
  exxomatic-net:
    driver: bridge
