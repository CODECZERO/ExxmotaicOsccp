# ═══════════════════════════════════════════════════════════════════════
#  Exxomatic IoT — Docker Compose
#  Full-stack: HAProxy (TLS) + Certbot + Flask API + Next.js + OCPP WS
#
#  SSL Flow:
#    1. HAProxy starts with self-signed fallback cert
#    2. Certbot obtains Let's Encrypt cert via Cloudflare DNS-01
#    3. Combined PEM is written to shared haproxy/certs volume
#    4. Certbot hot-reloads HAProxy via admin socket (no restart)
#    5. Auto-renewal runs every 12h
#
#  Required .env vars for SSL:
#    DOMAIN_NAME, LETSENCRYPT_EMAIL, CLOUDFLARE_API_TOKEN
# ═══════════════════════════════════════════════════════════════════════

services:

  # ─── HAProxy Reverse Proxy (HTTP + HTTPS) ───────────────────────────
  haproxy:
    image: haproxy:2.9-alpine
    container_name: exxomatic-haproxy
    user: root
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./haproxy/certs:/usr/local/etc/haproxy/certs
      - haproxy-sock:/var/run/haproxy
    entrypoint: >
      /bin/sh -c "
      apk add --no-cache openssl &&
      mkdir -p /usr/local/etc/haproxy/certs /var/run/haproxy &&
      echo '[init] Cleaning up any corrupted certificate files...' &&
      for f in /usr/local/etc/haproxy/certs/*.pem; do
        [ -f \"$$f\" ] || continue;
        if ! grep -q 'BEGIN' \"$$f\" 2>/dev/null; then
          echo \"[init] Removing invalid cert: $$f\";
          rm -f \"$$f\";
        fi;
      done &&
      if [ ! -f /usr/local/etc/haproxy/certs/fallback.pem ]; then
        echo '[init] Generating self-signed fallback certificate...' &&
        openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /tmp/key.pem -out /tmp/crt.pem -subj '/CN=localhost' &&
        cat /tmp/crt.pem /tmp/key.pem > /usr/local/etc/haproxy/certs/fallback.pem;
      fi &&
      echo '[init] Starting HAProxy...' &&
      haproxy -f /usr/local/etc/haproxy/haproxy.cfg
      "
    depends_on:
      server:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - exxomatic-net
    restart: unless-stopped

  # ─── Certbot (DNS-01 via Cloudflare) ────────────────────────────────
  #  Supports TWO modes (auto-detected by setup-ssl.sh):
  #    DNS-01:  Set CLOUDFLARE_API_TOKEN → wildcard + works behind proxy
  #    HTTP-01: Leave CLOUDFLARE_API_TOKEN empty → works with ANY domain
  #
  #  Required .env vars:
  #    DOMAIN_NAME=exxomatic.therisewebd.in
  #    LETSENCRYPT_EMAIL=admin@example.com
  #  Optional:
  #    CLOUDFLARE_API_TOKEN=<your-token>  (enables DNS-01 mode)
  # ─────────────────────────────────────────────────────────────────────
  certbot:
    image: certbot/dns-cloudflare
    container_name: exxomatic-certbot
    user: root
    volumes:
      - letsencrypt-data:/etc/letsencrypt
      - ./haproxy/certs:/haproxy-certs
      - ./scripts/setup-ssl.sh:/scripts/setup-ssl.sh:ro
      - haproxy-sock:/var/run/haproxy
      - certbot-webroot:/var/www/certbot
    entrypoint: ["/bin/sh", "/scripts/setup-ssl.sh"]
    expose:
      - "8080"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:-}
    depends_on:
      - haproxy
    networks:
      - exxomatic-net
    restart: unless-stopped

  # ─── Flask REST API (Gunicorn) ─────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: exxomatic-server
    env_file: .env
    environment:
      - BIND_HOST=0.0.0.0
      - API_PORT=5050
    expose:
      - "5050"
    networks:
      - exxomatic-net
    restart: unless-stopped

  # ─── Next.js Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: web-client/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: exxomatic-frontend
    expose:
      - "3000"
    networks:
      - exxomatic-net
    restart: unless-stopped

  # ─── OCPP WebSocket Server ────────────────────────────────────────
  ocpp-core:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: exxomatic-ocpp-core
    env_file: .env
    environment:
      - BIND_HOST=0.0.0.0
      - CORE_PORT=5000
    entrypoint: ["python", "-m", "core.main"]
    expose:
      - "5000"
    networks:
      - exxomatic-net
    restart: unless-stopped

  # ─── OCPP Echo Debug Server ──────────────────────────────────────
  ocpp-echo:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: exxomatic-ocpp-echo
    env_file: .env
    environment:
      - BIND_HOST=0.0.0.0
      - ECHO_PORT=8000
    entrypoint: ["python", "-m", "echo.main"]
    expose:
      - "8000"
    networks:
      - exxomatic-net
    restart: unless-stopped

  # ─── OCPP Echo-N Debug Server ────────────────────────────────────
  ocpp-echo-n:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: exxomatic-ocpp-echo-n
    env_file: .env
    environment:
      - BIND_HOST=0.0.0.0
      - ECHO_N_PORT=5001
    entrypoint: ["python", "echo-n/main.py"]
    expose:
      - "5001"
    networks:
      - exxomatic-net
    restart: unless-stopped

# ─── Named Volumes ──────────────────────────────────────────────────
volumes:
  # Persists Let's Encrypt cert state across container restarts.
  # Without this, certbot re-requests on every restart → rate limit.
  letsencrypt-data:

  # Shared Unix socket between HAProxy and Certbot.
  # Allows certbot to hot-reload certs without restarting HAProxy.
  haproxy-sock:

  # Webroot for HTTP-01 ACME challenges (used when no Cloudflare token).
  certbot-webroot:

networks:
  exxomatic-net:
    driver: bridge
